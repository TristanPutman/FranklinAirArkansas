name: Deploy to FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /franklinairarkansas.com/htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            .env*
            .github/**
            node_modules/**
            *.md
            LICENSE
            config.php
            schema.sql
            uploads/**
