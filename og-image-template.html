<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: Georgia, serif;
}
.card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1B2A4A 0%, #162240 50%, #1A2844 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px;
    position: relative;
    overflow: hidden;
}
.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 70% 50% at 85% 20%, rgba(196, 90, 45, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 10% 90%, rgba(42, 61, 107, 0.5) 0%, transparent 60%);
}
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
}
.content { position: relative; z-index: 1; }
.badge {
    display: inline-block;
    background: rgba(196, 90, 45, 0.2);
    border: 1.5px solid rgba(196, 90, 45, 0.5);
    color: #D97B4F;
    padding: 8px 20px;
    border-radius: 50px;
    font-family: -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
}
h1 {
    font-size: 64px;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 20px;
    font-weight: 400;
}
h1 span { color: #D97B4F; }
.subtitle {
    font-family: -apple-system, sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 36px;
}
.phone {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #C45A2D;
    color: #fff;
    padding: 16px 32px;
    border-radius: 8px;
    font-family: -apple-system, sans-serif;
    font-size: 22px;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(196, 90, 45, 0.4);
}
.phone svg { flex-shrink: 0; }
.bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(to right, #C45A2D, #D97B4F, #C45A2D);
}
</style>
</head>
<body>
<div class="card">
    <div class="content">
        <div class="badge">Licensed &amp; Insured HVAC Service</div>
        <h1>Franklin Air<br><span>Arkansas</span></h1>
        <p class="subtitle">Professional heating &amp; air conditioning service. Honest pricing, quality work, and a neighbor you can trust.</p>
        <div class="phone">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            (479) 207-2454
        </div>
    </div>
    <div class="bottom-bar"></div>
</div>
</body>
</html>
